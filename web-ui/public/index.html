<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Smart Weight System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app" x-data="weightApp()" x-init="init()" @unload.window="destroy()">

    <!-- Error Banner -->
    <div class="error-banner" x-show="errorMessage" x-text="errorMessage" x-transition></div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-item">
        <strong x-text="'Station: ' + CONFIG.stationId"></strong>
      </div>
      <div class="status-item">
        <span class="status-dot" :class="weightStatus === 'ok' ? 'connected' : 'disconnected'"></span>
        Scale
      </div>
      <div class="status-item">
        <span class="status-dot" :class="printerConnected ? 'connected' : 'disconnected'"></span>
        Printer
      </div>
      <div class="status-item">
        <span class="status-dot" :class="syncConnected ? 'connected' : 'disconnected'"></span>
        Sync
      </div>
    </div>

    <!-- Today's bag count -->
    <div class="today-bar">
      <div class="today-total">
        <span class="bags-number" x-text="totalBagsToday"></span>
        <span class="bags-label">bags today</span>
      </div>
    </div>

    <!-- Weight Display -->
    <div class="weight-card" :class="weightColorClass">
      <div>
        <span class="weight-value" x-text="weightDisplay"></span>
        <span class="weight-unit" x-text="unit"></span>
      </div>
      <div class="weight-status" x-text="weightLabel"></div>
    </div>

    <!-- Product Selector (always visible) -->
    <div class="select-wrapper">
      <select class="product-select" x-model="selectedPackId"
        :disabled="state === 'PRINTING' || state === 'PRINTED'">
        <option value="">-- Select Product --</option>
        <template x-for="p in products" :key="p.pack_id">
          <option
            :value="p.pack_id"
            x-text="p.name + (p.net_weight_gm ? ' (' + p.net_weight_gm + 'g)' : '')"
          ></option>
        </template>
      </select>
      <span class="select-arrow">&#9662;</span>
    </div>

    <!-- Last Bag Info + Reprint -->
    <div class="last-bag-row" x-show="lastBag" x-transition>
      <div class="last-bag-card">
        <span class="last-bag-label">Last:</span>
        <span class="last-bag-text" x-text="lastBagDisplay"></span>
      </div>
      <button class="reprint-btn"
        :disabled="state === 'PRINTING' || state === 'PRINTED'"
        @click="reprintLast()">Reprint</button>
    </div>

    <!-- Spacer pushes button to bottom -->
    <div class="spacer"></div>

    <!-- PRINT button (always visible) -->
    <button
      class="print-btn"
      :class="{
        printing: state === 'PRINTING',
        success: state === 'PRINTED',
        error: state === 'PRINT_FAILED'
      }"
      :disabled="printButtonDisabled"
      @click="state === 'PRINT_FAILED' ? retryPrint() : doPrint()"
      x-text="printButtonText"
    ></button>

  </div>

  <script src="lib/alpine.min.js" defer></script>
  <script src="config.js"></script>
  <script src="counter.js"></script>
  <script src="app.js"></script>
</body>
</html>
