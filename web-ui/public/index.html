<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Phase F: removed user-scalable=no — workers can zoom if needed -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Weight System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app" x-data="weightApp()" x-init="init()" @unload.window="destroy()">

    <!-- Phase F: Full-screen error modal (print failures + critical sync errors) -->
    <div class="error-modal" x-show="errorModal.show" x-cloak>
      <div class="error-modal-box">
        <div class="error-modal-title" x-text="errorModal.title"></div>
        <div class="error-modal-body" x-text="errorModal.body"></div>
        <div class="error-modal-actions">
          <button class="error-modal-retry-btn"
            x-show="errorModal.showRetry"
            @click="retryPrint(); dismissErrorModal()">
            RETRY PRINT
          </button>
          <button class="error-modal-dismiss-btn" @click="dismissErrorModal()">
            CLOSE
          </button>
        </div>
      </div>
    </div>

    <!-- Status Bar (Phase F: larger badges, clearer labels) -->
    <div class="status-bar">
      <div class="status-item station-id">
        <strong x-text="CONFIG.stationId"></strong>
      </div>
      <div class="status-item">
        <span class="status-badge" :class="weightStatusClass" x-text="weightStatusText"></span>
      </div>
      <div class="status-item">
        <span class="status-badge"
          :class="printerConnected ? 'status-connected' : 'status-disconnected'"
          x-text="printerStatusText"></span>
      </div>
      <div class="status-item">
        <span class="status-badge"
          :class="syncConnected ? 'status-connected' : 'status-disconnected'"
          x-text="syncStatusText"></span>
      </div>
    </div>

    <!-- Today's bag counter + Refresh button -->
    <div class="today-bar">
      <div class="today-total">
        <span class="bags-number" x-text="totalBagsToday"></span>
        <span class="bags-label">bags today</span>
      </div>
      <!-- Phase G: refresh + last-synced indicator -->
      <div class="refresh-group">
        <button class="refresh-btn"
          :disabled="refreshing"
          @click="refreshMasterData()"
          :class="{ spinning: refreshing }"
          title="Pull latest workers and products from server">
          <span x-text="refreshing ? 'Refreshing…' : '⟳ Refresh'"></span>
        </button>
        <!-- Last synced: shows HH:MM, yellow if >10 min, red if never -->
        <div class="sync-stamp"
          :class="{
            'sync-stale':  masterSyncAgeMin !== null && masterSyncAgeMin > 10,
            'sync-never':  masterSyncAgeMin === null
          }">
          <span class="sync-label">Synced:</span>
          <span x-text="lastMasterSyncDisplay"></span>
          <span x-show="masterSyncAgeMin !== null && masterSyncAgeMin > 10" class="sync-warn">⚠</span>
        </div>
      </div>
    </div>

    <!-- Main area -->
    <div class="main-area">

      <!-- Phase F: Recent panel — shows item + weight + time for each recent bag -->
      <div class="recent-panel">
        <div class="recent-panel-title">Recent</div>

        <template x-for="(p, idx) in recentProducts" :key="p.pack_id">
          <button
            class="recent-btn"
            :class="{ active: String(selectedPackId) === String(p.pack_id), 'recent-first': idx === 0 }"
            :disabled="state === 'PRINTING' || state === 'PRINTED' || state === 'PRINT_RETRYING'"
            @click="selectRecentProduct(p.pack_id)">
            <span class="recent-name" x-text="p.name"></span>
            <span class="recent-meta" x-show="p.weight_kg">
              <span x-text="p.weight_kg ? p.weight_kg + ' kg' : ''"></span>
              <span x-show="p.time" x-text="' · ' + p.time"></span>
            </span>
          </button>
        </template>

        <div class="recent-empty" x-show="recentProducts.length === 0">No recent</div>
      </div>

      <!-- Main Column -->
      <div class="main-col">

        <!-- Weight Display -->
        <div class="weight-card" :class="weightColorClass">
          <div>
            <span class="weight-value" x-text="weightDisplay"></span>
            <span class="weight-unit" x-text="unit"></span>
          </div>
          <div class="weight-status" x-text="weightLabel"></div>
        </div>

        <!-- Product Selector -->
        <div class="select-wrapper">
          <select class="product-select" x-model="selectedPackId"
            :disabled="state === 'PRINTING' || state === 'PRINTED' || state === 'PRINT_RETRYING'">
            <option value="">— Select Product —</option>
            <template x-for="p in products" :key="p.pack_id">
              <option
                :value="p.pack_id"
                x-text="p.name + (p.net_weight_gm ? ' (' + p.net_weight_gm + 'g)' : '')"
              ></option>
            </template>
          </select>
          <span class="select-arrow">&#9662;</span>
        </div>

        <!-- Worker Selectors -->
        <div class="worker-row">
          <div class="select-wrapper worker-select-wrapper">
            <select class="product-select worker-select" x-model="selectedWorker1"
              @change="onWorker1Change()"
              :disabled="state === 'PRINTING' || state === 'PRINTED' || state === 'PRINT_RETRYING'">
              <option value="">— Worker 1 * —</option>
              <template x-for="w in workers" :key="w.worker_code">
                <option :value="w.worker_code" x-text="w.worker_name + ' (' + w.worker_code + ')'"></option>
              </template>
            </select>
            <span class="select-arrow">&#9662;</span>
          </div>
          <div class="select-wrapper worker-select-wrapper">
            <select class="product-select worker-select" x-model="selectedWorker2"
              @change="onWorker2Change()"
              :disabled="state === 'PRINTING' || state === 'PRINTED' || state === 'PRINT_RETRYING'">
              <option value="">— Worker 2 —</option>
              <template x-for="w in filteredWorkers2" :key="w.worker_code">
                <option :value="w.worker_code" x-text="w.worker_name + ' (' + w.worker_code + ')'"></option>
              </template>
            </select>
            <span class="select-arrow">&#9662;</span>
          </div>
        </div>

        <!-- Phase F: Last Bag prominently displayed -->
        <div class="last-bag-row" x-show="lastBag" x-transition>
          <div class="last-bag-card">
            <div class="last-bag-header">Last Printed</div>
            <div class="last-bag-detail" x-text="lastBag ? lastBag.pack_name : ''"></div>
            <div class="last-bag-meta">
              <span x-text="lastBag && lastBag.weight_gm ? (lastBag.weight_gm/1000).toFixed(2) + ' kg' : ''"></span>
              <span x-show="lastBag && lastBag.printed_at" x-text="lastBag ? ' · ' + lastBag.printed_at : ''"></span>
              <span x-text="lastBag ? '  #' + lastBag.bag_number : ''"></span>
            </div>
          </div>
          <!-- Phase F: bigger reprint button -->
          <button class="reprint-btn"
            :disabled="state === 'PRINTING' || state === 'PRINTED' || state === 'PRINT_RETRYING'"
            @click="reprintLast()">
            ↻ Reprint
          </button>
        </div>

        <div class="spacer"></div>

        <!-- PRINT button -->
        <button
          class="print-btn"
          :class="{
            printing: state === 'PRINTING',
            retrying: state === 'PRINT_RETRYING',
            success:  state === 'PRINTED',
            error:    state === 'PRINT_FAILED'
          }"
          :disabled="printButtonDisabled"
          @click="state === 'PRINT_FAILED' ? retryPrint() : doPrint()"
          x-text="printButtonText"
        ></button>

      </div><!-- /.main-col -->
    </div><!-- /.main-area -->

  </div>

  <script src="lib/alpine.min.js" defer></script>
  <script src="config.js"></script>
  <script src="counter.js"></script>
  <script src="app.js"></script>
</body>
</html>
